version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4501}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: resumy-frontend
    ports:
      - "4500:3000" # Maps Host 4500 to Container 3000
    environment:
      - NODE_ENV=production
    restart: always

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: resumy-backend
    ports:
      - "4501:3001" # Maps Host 4501 to Container 3001
    environment:
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    env_file:
      - ./backend/.env
    restart: always
